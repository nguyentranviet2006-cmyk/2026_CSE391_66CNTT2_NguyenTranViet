<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>

body{
font-family: Arial;
margin:40px;
}

form{
width:400px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
}

.error{
color:red;
font-size:14px;
}

.success{
font-size:22px;
color:green;
font-weight:bold;
}

</style>

</head>
<body>

<h2>Đăng ký tài khoản</h2>

<form id="registerForm">

<label>Họ và tên</label>
<input id="fullname">
<div class="error" id="fullnameError"></div>

<label>Email</label>
<input id="email">
<div class="error" id="emailError"></div>

<label>Số điện thoại</label>
<input id="phone">
<div class="error" id="phoneError"></div>

<label>Mật khẩu</label>
<input type="password" id="password">
<div class="error" id="passwordError"></div>

<label>Xác nhận mật khẩu</label>
<input type="password" id="confirmPassword">
<div class="error" id="confirmPasswordError"></div>

<label>Giới tính</label><br>

<input type="radio" name="gender" value="Nam"> Nam
<input type="radio" name="gender" value="Nữ"> Nữ

<div class="error" id="genderError"></div>

<br><br>

<input type="checkbox" id="terms">
Tôi đồng ý điều khoản

<div class="error" id="termsError"></div>

<br><br>

<button type="submit">Đăng ký</button>

</form>

<div id="successMessage"></div>

<script>

const form = document.getElementById("registerForm")

function showError(field,message){
document.getElementById(field+"Error").innerText = message
}

function clearError(field){
document.getElementById(field+"Error").innerText = ""
}

function validateFullname(){

const name = document.getElementById("fullname").value.trim()
const regex = /^[A-Za-zÀ-ỹ\s]+$/

if(name === ""){
showError("fullname","Không được để trống")
return false
}

if(name.length < 3){
showError("fullname","Phải ≥ 3 ký tự")
return false
}

if(!regex.test(name)){
showError("fullname","Chỉ chứa chữ cái")
return false
}

clearError("fullname")
return true

}

function validateEmail(){

const email = document.getElementById("email").value.trim()

const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

if(email===""){
showError("email","Không được để trống")
return false
}

if(!regex.test(email)){
showError("email","Email không hợp lệ")
return false
}

clearError("email")
return true

}

function validatePhone(){

const phone = document.getElementById("phone").value.trim()

const regex = /^0\d{9}$/

if(phone===""){
showError("phone","Không được để trống")
return false
}

if(!regex.test(phone)){
showError("phone","SĐT phải 10 số và bắt đầu bằng 0")
return false
}

clearError("phone")
return true

}

function validatePassword(){

const password = document.getElementById("password").value

const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/

if(password===""){
showError("password","Không được để trống")
return false
}

if(!regex.test(password)){
showError("password","≥8 ký tự gồm hoa thường và số")
return false
}

clearError("password")
return true

}

function validateConfirmPassword(){

const pass = document.getElementById("password").value
const confirm = document.getElementById("confirmPassword").value

if(confirm !== pass){
showError("confirmPassword","Mật khẩu không khớp")
return false
}

clearError("confirmPassword")
return true

}

function validateGender(){

const genders = document.querySelectorAll("input[name='gender']")
let checked = false

genders.forEach(g=>{
if(g.checked) checked = true
})

if(!checked){
showError("gender","Phải chọn giới tính")
return false
}

clearError("gender")
return true

}

function validateTerms(){

const terms = document.getElementById("terms")

if(!terms.checked){
showError("terms","Bạn phải đồng ý điều khoản")
return false
}

clearError("terms")
return true

}

form.addEventListener("submit",function(e){

e.preventDefault()

const valid =
validateFullname() &
validateEmail() &
validatePhone() &
validatePassword() &
validateConfirmPassword() &
validateGender() &
validateTerms()

if(valid){

const name = document.getElementById("fullname").value

form.style.display = "none"

document.getElementById("successMessage").innerHTML =
`<div class="success">Đăng ký thành công! 🎉<br>Chào ${name}</div>`

}

})

document.getElementById("fullname").addEventListener("blur",validateFullname)
document.getElementById("email").addEventListener("blur",validateEmail)
document.getElementById("phone").addEventListener("blur",validatePhone)
document.getElementById("password").addEventListener("blur",validatePassword)
document.getElementById("confirmPassword").addEventListener("blur",validateConfirmPassword)

document.getElementById("fullname").addEventListener("input",()=>clearError("fullname"))
document.getElementById("email").addEventListener("input",()=>clearError("email"))
document.getElementById("phone").addEventListener("input",()=>clearError("phone"))
document.getElementById("password").addEventListener("input",()=>clearError("password"))
document.getElementById("confirmPassword").addEventListener("input",()=>clearError("confirmPassword"))

</script>

</body>
</html>
