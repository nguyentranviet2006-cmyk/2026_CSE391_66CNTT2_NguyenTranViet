<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng điểm sinh viên</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

input{
    padding:6px;
    margin-right:10px;
}

button{
    padding:6px 12px;
}

table{
    border-collapse: collapse;
    margin-top:20px;
    width:600px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#f2f2f2;
}

.low-score{
    background:yellow;
}

#stats{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<input id="name" placeholder="Họ tên">
<input id="score" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>
</table>

<div id="stats">
Tổng sinh viên: 0 | Điểm trung bình: 0
</div>

<script>

let students = []

const nameInput = document.getElementById("name")
const scoreInput = document.getElementById("score")
const tbody = document.getElementById("tableBody")
const stats = document.getElementById("stats")

function getRank(score){

    if(score >= 8.5) return "Giỏi"
    if(score >= 7) return "Khá"
    if(score >= 5) return "Trung bình"
    return "Yếu"

}

function renderTable(){

    tbody.innerHTML = ""

    students.forEach((sv,index)=>{

        const tr = document.createElement("tr")

        if(sv.score < 5){
            tr.classList.add("low-score")
        }

        tr.innerHTML = `
            <td>${index+1}</td>
            <td>${sv.name}</td>
            <td>${sv.score}</td>
            <td>${getRank(sv.score)}</td>
            <td>
                <button data-index="${index}">Xóa</button>
            </td>
        `

        tbody.appendChild(tr)

    })

    updateStats()
}

function updateStats(){

    const total = students.length

    let avg = 0

    if(total > 0){
        const sum = students.reduce((s,sv)=>s + sv.score,0)
        avg = (sum/total).toFixed(2)
    }

    stats.innerText = `Tổng sinh viên: ${total} | Điểm trung bình: ${avg}`

}

function addStudent(){

    const name = nameInput.value.trim()
    const score = parseFloat(scoreInput.value)

    if(name === "" || isNaN(score) || score < 0 || score > 10){
        alert("Vui lòng nhập đúng thông tin!")
        return
    }

    students.push({
        name:name,
        score:score
    })

    renderTable()

    nameInput.value = ""
    scoreInput.value = ""
    nameInput.focus()

}

document.getElementById("addBtn").onclick = addStudent

scoreInput.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        addStudent()
    }

})

tbody.addEventListener("click",function(e){

    if(e.target.tagName === "BUTTON"){

        const index = e.target.dataset.index

        students.splice(index,1)

        renderTable()

    }

})

</script>

</body>
</html>
