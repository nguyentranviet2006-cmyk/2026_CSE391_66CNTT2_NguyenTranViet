<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đặt Hàng</title>

<style>

body{
font-family: Arial;
margin:40px;
}

form{
width:420px;
}

input,select,textarea{
width:100%;
padding:8px;
margin:6px 0;
}

textarea{
height:80px;
}

.error{
color:red;
font-size:14px;
}

#charCount{
font-size:13px;
text-align:right;
}

#total{
font-weight:bold;
margin-top:10px;
}

#confirmBox{
border:1px solid #ccc;
padding:15px;
margin-top:20px;
display:none;
width:420px;
}

.success{
color:green;
font-size:20px;
font-weight:bold;
}

</style>

</head>
<body>

<h2>Đặt hàng</h2>

<form id="orderForm">

<label>Sản phẩm</label>
<select id="product">
<option value="">-- Chọn sản phẩm --</option>
<option value="Áo">Áo</option>
<option value="Quần">Quần</option>
<option value="Giày">Giày</option>
</select>
<div class="error" id="productError"></div>

<label>Số lượng</label>
<input type="number" id="quantity" min="1" max="99">
<div class="error" id="quantityError"></div>

<label>Ngày giao hàng</label>
<input type="date" id="date">
<div class="error" id="dateError"></div>

<label>Địa chỉ giao</label>
<input id="address">
<div class="error" id="addressError"></div>

<label>Ghi chú</label>
<textarea id="note"></textarea>
<div id="charCount">0 / 200</div>
<div class="error" id="noteError"></div>

<label>Thanh toán</label>

<input type="radio" name="pay" value="COD"> COD
<input type="radio" name="pay" value="Chuyển khoản"> Chuyển khoản
<input type="radio" name="pay" value="Ví điện tử"> Ví điện tử

<div class="error" id="payError"></div>

<div id="total">Tổng tiền: 0 đ</div>

<br>

<button type="submit">Đặt hàng</button>

</form>

<div id="confirmBox"></div>

<div id="success"></div>

<script>

const prices = {
"Áo":150000,
"Quần":200000,
"Giày":500000
}

const form = document.getElementById("orderForm")
const charCount = document.getElementById("charCount")

function showError(id,msg){
document.getElementById(id+"Error").innerText = msg
}

function clearError(id){
document.getElementById(id+"Error").innerText = ""
}

function validateProduct(){

const p = document.getElementById("product").value

if(p===""){
showError("product","Phải chọn sản phẩm")
return false
}

clearError("product")
return true

}

function validateQuantity(){

const q = document.getElementById("quantity").value

if(q==="" || q<1 || q>99){
showError("quantity","Số lượng 1–99")
return false
}

clearError("quantity")
return true

}

function validateDate(){

const d = document.getElementById("date").value

if(d===""){
showError("date","Phải chọn ngày")
return false
}

const today = new Date()
const delivery = new Date(d)

const diff = (delivery - today) / (1000*60*60*24)

if(diff < 0){
showError("date","Không được chọn ngày quá khứ")
return false
}

if(diff > 30){
showError("date","Không quá 30 ngày")
return false
}

clearError("date")
return true

}

function validateAddress(){

const a = document.getElementById("address").value.trim()

if(a.length < 10){
showError("address","Địa chỉ ≥10 ký tự")
return false
}

clearError("address")
return true

}

function validateNote(){

const n = document.getElementById("note").value

if(n.length > 200){
showError("note","Không quá 200 ký tự")
return false
}

clearError("note")
return true

}

function validatePay(){

const pays = document.querySelectorAll("input[name='pay']")

let checked=false

pays.forEach(p=>{
if(p.checked) checked=true
})

if(!checked){
showError("pay","Chọn phương thức thanh toán")
return false
}

clearError("pay")
return true

}

function updateTotal(){

const p = document.getElementById("product").value
const q = document.getElementById("quantity").value

let total = 0

if(prices[p] && q){
total = prices[p] * q
}

document.getElementById("total").innerText =
"Tổng tiền: " + total.toLocaleString("vi-VN") + " đ"

}

document.getElementById("product").addEventListener("change",updateTotal)
document.getElementById("quantity").addEventListener("input",updateTotal)

document.getElementById("note").addEventListener("input",function(){

const len = this.value.length

charCount.innerText = len + " / 200"

if(len>200){
charCount.style.color="red"
showError("note","Không quá 200 ký tự")
}else{
charCount.style.color="black"
clearError("note")
}

})

form.addEventListener("submit",function(e){

e.preventDefault()

const valid =
validateProduct() &
validateQuantity() &
validateDate() &
validateAddress() &
validateNote() &
validatePay()

if(!valid) return

const p = document.getElementById("product").value
const q = document.getElementById("quantity").value
const d = document.getElementById("date").value

const total = prices[p] * q

const confirmBox = document.getElementById("confirmBox")

confirmBox.innerHTML = `
<h3>Xác nhận đặt hàng</h3>
Sản phẩm: ${p}<br>
Số lượng: ${q}<br>
Ngày giao: ${d}<br>
Tổng tiền: ${total.toLocaleString("vi-VN")} đ
<br><br>
<button id="confirmBtn">Xác nhận</button>
<button id="cancelBtn">Hủy</button>
`

confirmBox.style.display="block"

document.getElementById("confirmBtn").onclick=function(){

form.style.display="none"
confirmBox.style.display="none"

document.getElementById("success").innerHTML=
'<div class="success">Đặt hàng thành công 🎉</div>'

}

document.getElementById("cancelBtn").onclick=function(){
confirmBox.style.display="none"
}

})

</script>

</body>
</html>
