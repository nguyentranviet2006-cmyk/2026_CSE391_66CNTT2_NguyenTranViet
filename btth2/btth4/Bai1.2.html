<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng điểm sinh viên</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

input,select{
    padding:6px;
    margin-right:10px;
}

button{
    padding:6px 12px;
}

table{
    border-collapse: collapse;
    margin-top:20px;
    width:700px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#f2f2f2;
    cursor:pointer;
}

.low-score{
    background:yellow;
}

#stats{
    margin-top:15px;
    font-weight:bold;
}

#noResult{
    text-align:center;
    padding:10px;
    color:red;
}
</style>
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<input id="name" placeholder="Họ tên">
<input id="score" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>

<br><br>

<input id="search" placeholder="Tìm kiếm tên...">

<select id="filterRank">
<option value="all">Tất cả</option>
<option value="Giỏi">Giỏi</option>
<option value="Khá">Khá</option>
<option value="Trung bình">Trung bình</option>
<option value="Yếu">Yếu</option>
</select>

<table>

<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th id="scoreHeader">Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div id="noResult" style="display:none">
Không có kết quả
</div>

<div id="stats"></div>

<script>

let students = []
let filteredStudents = []

let sortAsc = true

const nameInput = document.getElementById("name")
const scoreInput = document.getElementById("score")
const tbody = document.getElementById("tableBody")
const stats = document.getElementById("stats")
const searchInput = document.getElementById("search")
const filterRank = document.getElementById("filterRank")
const scoreHeader = document.getElementById("scoreHeader")
const noResult = document.getElementById("noResult")

function getRank(score){

    if(score >= 8.5) return "Giỏi"
    if(score >= 7) return "Khá"
    if(score >= 5) return "Trung bình"
    return "Yếu"

}

function addStudent(){

    const name = nameInput.value.trim()
    const score = parseFloat(scoreInput.value)

    if(name === "" || isNaN(score) || score < 0 || score > 10){
        alert("Nhập sai dữ liệu!")
        return
    }

    students.push({name,score})

    nameInput.value=""
    scoreInput.value=""
    nameInput.focus()

    applyFilters()

}

function applyFilters(){

    const keyword = searchInput.value.toLowerCase()
    const rankFilter = filterRank.value

    filteredStudents = students.filter(sv=>{

        const matchName = sv.name.toLowerCase().includes(keyword)
        const rank = getRank(sv.score)

        const matchRank = rankFilter==="all" || rank===rankFilter

        return matchName && matchRank

    })

    filteredStudents.sort((a,b)=>{
        return sortAsc ? a.score-b.score : b.score-a.score
    })

    renderTable()

}

function renderTable(){

    tbody.innerHTML=""

    if(filteredStudents.length===0){

        noResult.style.display="block"
        stats.innerText=""
        return

    }

    noResult.style.display="none"

    filteredStudents.forEach((sv,index)=>{

        const tr=document.createElement("tr")

        if(sv.score<5){
            tr.classList.add("low-score")
        }

        tr.innerHTML=`
        <td>${index+1}</td>
        <td>${sv.name}</td>
        <td>${sv.score}</td>
        <td>${getRank(sv.score)}</td>
        <td>
        <button data-index="${students.indexOf(sv)}">Xóa</button>
        </td>
        `

        tbody.appendChild(tr)

    })

    updateStats()

}

function updateStats(){

    const total=filteredStudents.length

    const sum=filteredStudents.reduce((s,sv)=>s+sv.score,0)

    const avg=(sum/total).toFixed(2)

    stats.innerText=`Tổng sinh viên: ${total} | Điểm trung bình: ${avg}`

}

document.getElementById("addBtn").onclick=addStudent

scoreInput.addEventListener("keypress",e=>{
if(e.key==="Enter") addStudent()
})

searchInput.addEventListener("input",applyFilters)

filterRank.addEventListener("change",applyFilters)

scoreHeader.addEventListener("click",()=>{

    sortAsc=!sortAsc

    scoreHeader.innerText="Điểm " + (sortAsc ? "▲" : "▼")

    applyFilters()

})

tbody.addEventListener("click",e=>{

    if(e.target.tagName==="BUTTON"){

        const index=e.target.dataset.index

        students.splice(index,1)

        applyFilters()

    }

})

applyFilters()

</script>

</body>
</html>
